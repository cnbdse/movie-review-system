<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電影評論查詢</title>

<style>

body{
    margin:0;
    padding:30px;
    background:#f2f2f2;
    font-family:"Microsoft JhengHei",Arial;
}

.container{
    width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    color:#0066cc;
}

form{
    text-align:center;
    margin:30px;
}

input{
    width:350px;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid gray;
}

button{
    padding:12px 25px;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#004d99;
}

.card{
    background:white;
    padding:20px;
    margin:20px 0;
    border-radius:12px;
    box-shadow:0 0 8px #ccc;
}

.back{
    text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>🎬 電影評論查詢系統</h1>

<a class="back" href="/">← 回首頁</a>

<form method="get">

<input
type="text"
name="keyword"
placeholder="輸入電影名稱或類型"
value="{{ keyword }}">

<button type="submit">搜尋</button>

</form>

{% for movie in movies %}

<div class="card">

<h2>{{ movie.title }}</h2>

<p><b>🎭 類型：</b>{{ movie.genre }}</p>

<p><b>⭐ 評分：</b>{{ movie.rating }}</p>

<p><b>📝 評論：</b>{{ movie.review }}</p>

</div>

{% endfor %}

</div>

</body>

</html>
